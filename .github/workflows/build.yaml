name: Build and Push

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: rk90229/cf-tunnel-operator:main-${{ steps.vars.outputs.sha }}

      - name: Update deployment.yaml
        run: |
          sed -i "s|image: rk90229/cf-tunnel-operator:.*|image: rk90229/cf-tunnel-operator:main-${{ steps.vars.outputs.sha }}|" deploy/deployment.yaml

      - name: Commit updated deployment.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deploy/deployment.yaml
          git commit -m "ci: update image to main-${{ steps.vars.outputs.sha }}"
          git push

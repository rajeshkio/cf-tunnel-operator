apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Release.Name }}-test
  containers:
    - name: test
      image: bitnami/kubectl:latest
      command:
        - sh
        - -c
        - |
          kubectl get deployment {{ .Release.Name }} -n {{ .Values.namespace }} && \
          kubectl get serviceaccount {{ .Values.serviceAccount.name }} -n {{ .Values.namespace }} && \
          kubectl get clusterrole {{ .Values.clusterrole.name }} && \
          kubectl rollout status deployment/{{ .Release.Name }} -n {{ .Values.namespace }}

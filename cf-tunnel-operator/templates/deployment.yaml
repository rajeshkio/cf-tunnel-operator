apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }} 
  namespace: {{ .Values.namespace }} 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }} 
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }} 
      containers:
        - name: operator
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }} 
          imagePullPolicy: Always
          env:
            - name: CF_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecret }} 
                  key: CF_ACCOUNT_ID
            - name: CF_TUNNEL_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecret }} 
                  key: CF_TUNNEL_ID
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecret }}
                  key: CF_API_TOKEN
            - name: CF_DNS_ZONE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecret }}
                  key: CF_DNS_ZONE_ID 
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
